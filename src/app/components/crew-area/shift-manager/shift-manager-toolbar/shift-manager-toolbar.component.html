<div>
  <p-toolbar>
    <ng-template #start>
      <div class="toolbar-row">
        <ng-container *ngFor="let btn of buttonConfigs">
          <p-button
            [hidden]="btn.hide"
            [disabled]="actionsDisabled()"
            [icon]="btn.icon"
            raised
            [severity]="btn.severity"
            [pTooltip]="btn.tooltip"
            tooltipPosition="bottom"
            (click)="btn.onClick()"
          ></p-button>
        </ng-container>
        <p-divider layout="vertical"></p-divider>
        <p-multiselect
          [options]="yearOptions"
          [ngModel]="selectedYears()"
          [filter]="false"
          [showToggleAll]="false"
          placeholder="Alle"
          [maxSelectedLabels]="3"
          (ngModelChange)="onScopeYearChange($event)"
          inputId="year"
          display="chip"
          pTooltip="Festivaljahre"
          [style]="{ 'min-width': '150px' }"
        />
        <p-divider layout="vertical"></p-divider>
        <p-button
          icon="pi pi-filter-slash"
          severity="secondary"
          pTooltip="Alle Filter zurücksetzen"
          tooltipPosition="bottom"
          (click)="resetFilters()"
        ></p-button>
        <p-button
          icon="pi pi-refresh"
          severity="secondary"
          pTooltip="Liste neu laden"
          tooltipPosition="bottom"
          (click)="refreshRequest.emit()"
        ></p-button>
        <p-divider layout="vertical"></p-divider>
        <p-button
          icon="pi pi-file-pdf"
          severity="secondary"
          pTooltip="Als PDF herunterladen"
          tooltipPosition="bottom"
          (click)="exportPdfRequest.emit()"
        ></p-button>
        <p-button
          icon="pi pi-file-excel"
          severity="secondary"
          pTooltip="Als Excel herunterladen"
          tooltipPosition="bottom"
          (click)="exportExcelRequest.emit()"
        ></p-button>
      </div>
    </ng-template>

    <ng-template #center> </ng-template>

    <ng-template #end>
      <div class="toolbar-row">
        <p-select
          [options]="contactPersonOptions()"
          [ngModel]="contactPersonFilter()"
          (ngModelChange)="contactPersonFilter.set($event ?? '')"
          [showClear]="true"
          placeholder="Kontaktperson Filter"
          panelStyleClass="slim-select-panel"
          [style]="{ 'min-width': '200px' }"
        ></p-select>
        <p-multiSelect
          [options]="statusOptions()"
          [ngModel]="statusFilter()"
          (ngModelChange)="statusFilter.set($event ?? [])"
          placeholder="Status Filter"
          optionLabel="label"
          optionValue="value"
          [filter]="false"
          [showToggleAll]="false"
          [showClear]="true"
          display="chip"
          variant="filled"
          [style]="{ 'min-width': '180px' }"
        />
        <p-divider layout="vertical"></p-divider>
        <p-inputGroup>
          <p-inputgroup-addon>
            <i class="pi pi-search"></i>
          </p-inputgroup-addon>

          <input
            type="text"
            pInputText
            placeholder="Keyword Filter"
            [(ngModel)]="keywordFilter"
          />

          <p-inputgroup-addon [style.padding]="'0'">
            <p-selectButton
              [options]="nameFilterOptions"
              [(ngModel)]="selectedFilters"
              optionValue="value"
              [multiple]="true"
              size="small"
            >
              <ng-template #item let-item>
                <i
                  [class]="item.icon"
                  [pTooltip]="item.tooltip"
                  tooltipPosition="top"
                ></i>
              </ng-template>
            </p-selectButton>
          </p-inputgroup-addon>
        </p-inputGroup>
      </div>
    </ng-template>
  </p-toolbar>
</div>
